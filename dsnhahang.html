    }

    .filter-bar button {
        font-size: 12px;
        padding: 4px 12px;
        border-radius: 20px;
        border: 0.5px solid var(--color-border-secondary);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        cursor: pointer
    }

    .filter-bar button.active {
        background: #1a6fd4;
        color: #fff;
        border-color: #1a6fd4
    }

    .filter-bar button:hover:not(.active) {
        background: var(--color-background-secondary)
    }

    .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 1rem
    }

    .stat {
        background: var(--color-background-secondary);
        border-radius: 8px;
        padding: 10px 12px;
        text-align: center
    }

    .stat-n {
        font-size: 20px;

        color: var(--color-text-primary)

    .stat-l {

    .rh-wrap {

    }

        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: 10px;

    .rh-head {
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        gap: 8px;
        align-items: center;
        padding: 10px 14px;
        cursor: pointer;

    .rh-head:hover {
        background: var(--color-background-secondary)
    }

    .rh-title {
        font-weight: 500;
        font-size: 13px;

    }

    .b-hcm {
        background: #FAECE7;
        color: #993C1D
    }

    .b-dn {
        background: #E1F5EE;
        color: #085041

    .b-ha {
        background: #FAEEDA;
        color: #854F0B
    }

    .cat-b {
        background: var(--color-background-secondary);
        color: var(--color-text-secondary);
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 20px
    }

    .chevron {
        font-size: 14px;
        color: var(--color-text-secondary);
        transition: transform 0.2s
    }

    .chevron.open {
        transform: rotate(180deg)
    }

    .menu-wrap {
        display: none;
        border-top: 0.5px solid var(--color-border-tertiary)
    }

    .menu-wrap.open {
        display: block
    }

    .menu-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px
    }

    .menu-table th {
        background: var(--color-background-secondary);
        color: var(--color-text-secondary);
        font-weight: 500;
        padding: 7px 14px;
        text-align: left;
        white-space: nowrap
    }

    .menu-table td {
        padding: 7px 14px;
        border-top: 0.5px solid var(--color-border-tertiary);
        color: var(--color-text-primary);

    .l-mc {

    }

    .l-phu {

    }

    .avail-on {
        display: inline-block;
        width: 28px;
        height: 16px;
        border-radius: 10px;
        background: #1a6fd4;
        position: relative
    }

    .avail-on::after {
        content: '';

        top: 2px;

        height: 12px;

    .price {

        color: var(--color-text-primary);

    }

    function render(list) {
        const el = document.getElementById('list');
        el.innerHTML = '';
        list.forEach(r => {
            const div = document.createElement('div');
            div.className = 'rh';
            div.innerHTML = `
      <div class="rh-head" onclick="toggle(${r.id})">
        <div>
          <div class="rh-title"><i class="ti ti-building-store" style="font-size:13px;margin-right:5px;vertical-align:-1px" aria-hidden="true"></i>${r.ten}</div>
          <div class="rh-sub">${r.dc} &middot; ${r.gio} &middot; ${r.min.toLocaleString()}–${r.max.toLocaleString()}đ</div>
        </div>
        <span class="badge ${cityBadge[r.tp]}">${r.tp}</span>
        <span class="cat-b">${r.dm}</span>
        <i class="ti ti-chevron-down chevron ${openId === r.id ? 'open' : ''}" id="ch-${r.id}" aria-hidden="true"></i>
      </div>
      <div class="menu-wrap ${openId === r.id ? 'open' : ''}" id="mw-${r.id}">
        <table class="menu-table">
          <thead><tr>
            <th style="width:5%">#</th>
            <th style="width:35%">Tên món</th>
            <th style="width:20%">Loại món</th>
            <th style="width:20%">Giá (VNĐ)</th>
            <th style="width:20%">Cho đặt món</th>
          </tr></thead>
          <tbody>
            ${r.menu.map((m, i) => `
              <tr>
                <td style="color:var(--color-text-secondary);text-align:center">${i + 1}</td>
                <td style="font-weight:500">${m.mon}</td>
                <td><span class="loai-b ${loaiCls[m.loai] || 'l-mc'}">${m.loai}</span></td>
                <td class="price">${m.gia.toLocaleString()}đ</td>
                <td><span class="avail-on" aria-label="Còn phục vụ"></span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
            el.appendChild(div);
        });
    }

    function toggle(id) {
        openId = openId === id ? null : id;
        const filtered = currentCity === 'all' ? restaurants : restaurants.filter(r => r.tp === currentCity);
        render(filtered);
    }

    function filter(city, btn) {
        document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCity = city;
        openId = null;
        const filtered = city === 'all' ? restaurants : restaurants.filter(r => r.tp === city);
        render(filtered);
    }

    render(restaurants);
</script>
