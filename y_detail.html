<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0
    }

    .app {
        font-size: 13px;
        padding: 8px 0
    }

    .tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 16px;
        flex-wrap: wrap
    }

    .tab-btn {
        padding: 6px 14px;
        border: 0.5px solid var(--color-border-secondary);
        border-radius: 20px;
        background: transparent;
        color: var(--color-text-secondary);
        cursor: pointer;
        font-size: 12px;
        transition: all .15s
    }

    .tab-btn.active {
        background: var(--color-background-info);
        color: var(--color-text-info);
        border-color: var(--color-border-info)
    }

    .page-list {
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 12px;
        min-height: 480px
    }

    .sidebar {
        display: flex;
        flex-direction: column;
        gap: 4px
    }

    .page-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border: none;
        background: transparent;
        border-radius: var(--border-radius-md);
        cursor: pointer;
        text-align: left;
        font-size: 12px;
        color: var(--color-text-secondary);
        transition: all .15s;
        width: 100%
    }

    .page-btn:hover {
        background: var(--color-background-secondary)
    }

    .page-btn.active {
        background: var(--color-background-secondary);
        color: var(--color-text-primary);
        font-weight: 500
    }

    .page-btn .pi {
        font-size: 15px;
        opacity: .7;
        flex-shrink: 0
    }

    .content-area {
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);
        padding: 16px;
        overflow: auto
    }

    .page-title {
        font-size: 15px;
        font-weight: 500;
        color: var(--color-text-primary);
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 8px
    }

    .page-route {
        font-size: 11px;
        color: var(--color-text-tertiary);
        font-family: var(--font-mono);
        margin-bottom: 12px
    }

    .section {
        margin-bottom: 14px
    }

    .section-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        letter-spacing: .05em;
        margin-bottom: 6px
    }

    .item-list {
        display: flex;
        flex-direction: column;
        gap: 4px
    }

    .item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 7px 10px;
        background: var(--color-background-secondary);
        border-radius: var(--border-radius-md);
        font-size: 12px;
        color: var(--color-text-primary);
        line-height: 1.5
    }

    .item .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 5px
    }

    .dot-ui {
        background: #378ADD
    }

    .dot-logic {
        background: #1D9E75
    }

    .dot-valid {
        background: #D85A30
    }

    .dot-guard {
        background: #D4537E
    }

    .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 7px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 500;
        margin-right: 4px;
        white-space: nowrap
    }

    .b-get {
        background: #E1F5EE;
        color: #085041
    }

    .b-post {
        background: #FAEEDA;
        color: #633806
    }

    .b-put {
        background: #E6F1FB;
        color: #0C447C
    }

    .b-del {
        background: #FCEBEB;
        color: #791F1F
    }

    .b-auth {
        background: #EEEDFE;
        color: #3C3489
    }

    .b-admin {
        background: #FAECE7;
        color: #712B13
    }

    .method-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 5px;
        flex-wrap: wrap
    }

    .divider {
        height: 0.5px;
        background: var(--color-border-tertiary);
        margin: 10px 0
    }

    .empty {
        color: var(--color-text-tertiary);
        font-size: 12px;
        padding: 20px;
        text-align: center
    }
</style>

<div class="app">

        <div class="content-area" id="content">

    </div>
</div>

                    'Rate limit: throttle 5 lần/phút tránh brute force',
                ],
                guard: ['guest']
            },
            {
                id: 'register', icon: 'ti-user-plus', label: 'Đăng ký',
                title: 'Trang đăng ký', route: 'GET|POST /register',
                ui: [
                    'Form: họ tên, email, SĐT, mật khẩu, xác nhận mật khẩu',
                    'Nút đăng ký',
                    'Link "Đã có tài khoản? Đăng nhập"',
                    'Lỗi validation hiện dưới từng field',
                ],
                logic: [
                    'Validate: email unique, password min:8, confirmed, phone regex VN',
                    'Hash password: bcrypt($request->password)',
                    'Tạo user với role=user mặc định',
                    'Tự động đăng nhập sau khi đăng ký: Auth::login($user)',
                    'Redirect về trang chủ với flash "Đăng ký thành công"',
                ],
                guard: ['guest']
            },
            {
                id: 'profile', icon: 'ti-user', label: 'Hồ sơ cá nhân',
                title: 'Hồ sơ cá nhân', route: 'GET /profile',
                ui: [
                    'Thông tin: avatar (upload), họ tên, email (readonly), SĐT',
                    'Form đổi mật khẩu: mật khẩu hiện tại, mới, xác nhận',
                    'Lịch sử đặt bàn gần đây: 5 đơn mới nhất + link xem tất cả',
                ],
                logic: [
                    'Middleware auth',
                    'Cập nhật: validate UpdateUserRequest, lưu, redirect back với success message',
                    'Đổi mật khẩu: kiểm tra Hash::check($current, $user->password) trước',
                ],
                guard: ['auth']
            },
        ]
    };

    let currentTab = 'frontend';
    let currentPage = null;

    function switchTab(tab) {
        currentTab = tab;
        currentPage = null;
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
            b.classList.toggle('active', ['frontend', 'admin', 'auth'][i] === tab);
        });
        renderSidebar();
        document.getElementById('content').innerHTML = '<div class="empty">Chọn trang để xem chi tiết</div>';
    }

    function renderSidebar() {
        const list = pages[currentTab];
        document.getElementById('sidebar').innerHTML = list.map(p => `
    <button class="page-btn ${currentPage === p.id ? 'active' : ''}" onclick="showPage('${p.id}')">
      <i class="ti ${p.icon} pi" aria-hidden="true"></i>
      <span>${p.label}</span>
    </button>
  `).join('');
    }

    function showPage(id) {
        currentPage = id;
        renderSidebar();
        const p = pages[currentTab].find(x => x.id === id);
        if (!p) return;

        const guardBadges = p.guard.map(g => {
            if (g === 'auth') return '<span class="badge b-auth"><i class="ti ti-lock" style="font-size:10px"></i> auth</span>';
            if (g === 'admin') return '<span class="badge b-admin"><i class="ti ti-shield" style="font-size:10px"></i> admin</span>';
            if (g === 'guest') return '<span class="badge b-get">guest only</span>';
            if (g === 'owner') return '<span class="badge b-put">owner check</span>';
            return '';
        }).join('');

        const methods = p.route.split(' ');
        const methodBadges = methods.map(m => {
            const cls = { GET: 'b-get', POST: 'b-post', PUT: 'b-put', DELETE: 'b-del' }[m] || 'b-get';
            return m.includes('/') ? `<code style="font-size:11px;color:var(--color-text-secondary)">${m}</code>` : `<span class="badge ${cls}">${m}</span>`;
        }).join(' ');

        const uiItems = p.ui.map(t => `<div class="item"><span class="dot dot-ui"></span><span>${t}</span></div>`).join('');
        const logicItems = p.logic.map(t => `<div class="item"><span class="dot dot-logic"></span><span>${t}</span></div>`).join('');

        document.getElementById('content').innerHTML = `
    <div class="page-title">
      <i class="ti ${p.icon}" style="font-size:18px" aria-hidden="true"></i>
      ${p.title}
    </div>
    <div class="method-row">${methodBadges} ${guardBadges}</div>
    ${p.ui.length ? `<div class="section"><div class="section-label"><i class="ti ti-layout" style="font-size:11px"></i> UI / Nội dung hiển thị</div><div class="item-list">${uiItems}</div></div>` : ''}
    ${p.logic.length ? `<div class="divider"></div><div class="section"><div class="section-label"><i class="ti ti-code" style="font-size:11px"></i> Logic / Backend</div><div class="item-list">${logicItems}</div></div>` : ''}
  `;
    }

    renderSidebar();
    showPage(pages[currentTab][0].id);
</script>
